version: "3.9"
name: cryptoprice

# ─────────────────────────────────────────────────────────────────────────────
# NETWORK
# ─────────────────────────────────────────────────────────────────────────────
networks:
  crypto-net:
    driver: bridge

# ─────────────────────────────────────────────────────────────────────────────
# VOLUMES
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  kafka-data:
  minio-data:
  influxdb-data:
  influxdb-config:
  postgres-data:
  keydb-data:
  flink-checkpoints:
  spark-events:
  trino-data:
  dagster-home:

services:

# ══════════════════════════════════════════════════════════════════════════════
# DATA LAYER
# ══════════════════════════════════════════════════════════════════════════════

  kafka:
    image: bitnami/kafka:3.9
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_LOG_RETENTION_HOURS: 168
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_CFG_NUM_PARTITIONS: 3
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka-data:/bitnami/kafka
    networks:
      - crypto-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  minio:
    image: minio/minio:latest
    container_name: minio
    hostname: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - crypto-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # MinIO bucket init - runs once then exits
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/cryptoprice;
        mc mb --ignore-existing local/flink-checkpoints;
        echo 'Buckets ready.';
      "
    networks:
      - crypto-net

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    hostname: influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpass123
      DOCKER_INFLUXDB_INIT_ORG: vi
      DOCKER_INFLUXDB_INIT_BUCKET: crypto
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN}
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    networks:
      - crypto-net
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    hostname: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: iceberg
      POSTGRES_PASSWORD: iceberg123
      POSTGRES_DB: iceberg_catalog
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - crypto-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iceberg -d iceberg_catalog"]
      interval: 10s
      timeout: 5s
      retries: 5

  keydb:
    image: eqalpha/keydb:latest
    container_name: keydb
    hostname: keydb
    ports:
      - "6379:6379"
    command: keydb-server --save 60 1 --loglevel warning
    volumes:
      - keydb-data:/data
    networks:
      - crypto-net
    healthcheck:
      test: ["CMD", "keydb-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

# ══════════════════════════════════════════════════════════════════════════════
# COMPUTE LAYER
# ══════════════════════════════════════════════════════════════════════════════

  flink-jobmanager:
    build:
      context: ./docker/flink
    image: cryptoprice/flink:1.18.1
    container_name: flink-jobmanager
    hostname: flink-jobmanager
    ports:
      - "8081:8081"   # Flink Web UI
    command: jobmanager
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: vi
      INFLUX_BUCKET: crypto
      REDIS_HOST: keydb
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - ./:/app
      - flink-checkpoints:/tmp/flink-checkpoints
    networks:
      - crypto-net
    depends_on:
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      keydb:
        condition: service_healthy

  flink-taskmanager:
    build:
      context: ./docker/flink
    image: cryptoprice/flink:1.18.1
    container_name: flink-taskmanager
    hostname: flink-taskmanager
    command: taskmanager
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: vi
      INFLUX_BUCKET: crypto
      REDIS_HOST: keydb
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - ./:/app
      - flink-checkpoints:/tmp/flink-checkpoints
    networks:
      - crypto-net
    depends_on:
      - flink-jobmanager

  spark-master:
    image: bitnami/spark:3.4.1
    container_name: spark-master
    hostname: spark-master
    ports:
      - "7077:7077"
      - "8082:8080"   # Spark Master UI
      - "18080:18080" # Spark History Server
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8080
      SPARK_HISTORY_OPTS: "-Dspark.history.fs.logDirectory=/opt/spark-events -Dspark.history.ui.port=18080"
    volumes:
      - ./:/app
      - spark-events:/opt/spark-events
      - ./spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf:ro
    networks:
      - crypto-net
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy

  spark-worker:
    image: bitnami/spark:3.4.1
    container_name: spark-worker
    hostname: spark-worker
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 4G
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_WEBUI_PORT: 8083
    volumes:
      - ./:/app
      - spark-events:/opt/spark-events
    networks:
      - crypto-net
    depends_on:
      - spark-master

# ══════════════════════════════════════════════════════════════════════════════
# QUERY + ORCHESTRATION LAYER
# ══════════════════════════════════════════════════════════════════════════════

  trino:
    image: trinodb/trino:442
    container_name: trino
    hostname: trino
    ports:
      - "8083:8080"   # Trino UI (avoid conflict with spark UI on 8082)
    volumes:
      - ./docker/trino/etc:/etc/trino:ro
      - trino-data:/data/trino
    networks:
      - crypto-net
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

  dagster-webserver:
    build:
      context: ./docker/dagster
    image: cryptoprice/dagster:latest
    container_name: dagster-webserver
    hostname: dagster-webserver
    ports:
      - "3000:3000"
    command: dagster-webserver -h 0.0.0.0 -p 3000 -w /app/orchestration/workspace.yaml
    environment:
      DAGSTER_HOME: /dagster-home
      SPARK_MASTER: spark://spark-master:7077
      KAFKA_BOOTSTRAP: kafka:9092
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - ./:/app
      - dagster-home:/dagster-home
      - spark-events:/opt/spark-events
    networks:
      - crypto-net
    depends_on:
      - postgres
      - spark-master

  dagster-daemon:
    build:
      context: ./docker/dagster
    image: cryptoprice/dagster:latest
    container_name: dagster-daemon
    command: dagster-daemon run
    environment:
      DAGSTER_HOME: /dagster-home
      SPARK_MASTER: spark://spark-master:7077
      KAFKA_BOOTSTRAP: kafka:9092
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - ./:/app
      - dagster-home:/dagster-home
      - spark-events:/opt/spark-events
    networks:
      - crypto-net
    depends_on:
      - dagster-webserver

# ══════════════════════════════════════════════════════════════════════════════
# PRODUCER (long-running stream)
# ══════════════════════════════════════════════════════════════════════════════

  producer:
    build:
      context: ./docker/producer
    container_name: producer
    hostname: producer
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
    volumes:
      - ./:/app
    networks:
      - crypto-net
    depends_on:
      kafka:
        condition: service_healthy
