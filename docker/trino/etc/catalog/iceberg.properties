connector.name=iceberg

# ─── Iceberg JDBC catalog → PostgreSQL ───────────────────────────────────────
iceberg.catalog.type=jdbc
iceberg.jdbc-catalog.driver-class=org.postgresql.Driver
iceberg.jdbc-catalog.connection-url=jdbc:postgresql://postgres:5432/iceberg_catalog
iceberg.jdbc-catalog.connection-user=__POSTGRES_USER__
iceberg.jdbc-catalog.connection-password=__POSTGRES_PASSWORD__
iceberg.jdbc-catalog.catalog-name=iceberg_catalog
iceberg.jdbc-catalog.default-warehouse-dir=s3://cryptoprice/iceberg
iceberg.register-table-procedure.enabled=true

# ─── Object storage → MinIO ───────────────────────────────────────────────────
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.region=us-east-1
s3.path-style-access=true
s3.aws-access-key=__MINIO_ROOT_USER__
s3.aws-secret-key=__MINIO_ROOT_PASSWORD__
