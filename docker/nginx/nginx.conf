# ─────────────────────────────────────────────────────────────────────────────
# Nginx configuration for Crypto Dashboard
# ─────────────────────────────────────────────────────────────────────────────
# - Serves React SPA static files at /
# - Proxies /api/* requests to FastAPI backend (fastapi:8000)
# - Handles WebSocket upgrade for /api/stream
# ─────────────────────────────────────────────────────────────────────────────

upstream fastapi_backend {
    server fastapi:8000;
}

# Map to conditionally set Connection header for WebSocket upgrade
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ── WebSocket endpoint ────────────────────────────────────────
    location /api/stream {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── REST API proxy ────────────────────────────────────────────
    location /api/ {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # ── React SPA (catch-all for client-side routing) ─────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ──────────────────────────────────────
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
